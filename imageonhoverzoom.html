<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
    <style>
        .img-wrapper{
            width: 400px;
            height: 400px;
            border:10px solid red;
            position: relative;
            overflow: hidden;
        }

        .inner-img{
            width: 100%;
            height: 100%;
            transform: 2s;
            object-fit: cover;

        }

        .inner-img:hover{
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    <div class="img-wrapper">
        <img class="inner-img" src="images/storme22k-cow-9049115_1920.jpg" width="400px" height="400px">

    </div>
</body>
</html>
